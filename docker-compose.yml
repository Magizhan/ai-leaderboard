services:
  app:
    build: .
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - PORT=3000
      - DATABASE_URL=postgresql://leaderboard:leaderboard@postgres:5432/ai_leaderboard
      - PLAN_COST=200
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    ports:
      - "${PG_PORT:-5432}:5432"
    environment:
      - POSTGRES_DB=ai_leaderboard
      - POSTGRES_USER=leaderboard
      - POSTGRES_PASSWORD=leaderboard
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leaderboard"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pg-data:
