services:
  app:
    build: .
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - PLAN_COST=200
      # Leave empty to skip CF Access auth (or set for JWT verification)
      # - CF_ACCESS_AUD=
      # - CF_ACCESS_TEAM_DOMAIN=
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis-data:
