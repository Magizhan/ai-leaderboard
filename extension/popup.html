<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    width: 340px;
    background: #0f0f1a;
    color: #e2e8f0;
  }
  .header {
    background: linear-gradient(135deg, #7c3aed, #3b82f6);
    padding: 16px 20px;
    text-align: center;
  }
  .header h1 { font-size: 15px; font-weight: 700; letter-spacing: 0.5px; }
  .header p { font-size: 11px; opacity: 0.8; margin-top: 2px; }
  .body { padding: 16px 20px; }

  .status {
    text-align: center; padding: 10px 12px; border-radius: 8px;
    font-size: 12px; margin-bottom: 12px; line-height: 1.5;
  }
  .status.info { background: rgba(59, 130, 246, 0.15); border: 1px solid rgba(59, 130, 246, 0.3); color: #93c5fd; }
  .status.success { background: rgba(34, 197, 94, 0.15); border: 1px solid rgba(34, 197, 94, 0.3); color: #86efac; }
  .status.error { background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3); color: #fca5a5; }
  .status.loading { background: rgba(168, 85, 247, 0.15); border: 1px solid rgba(168, 85, 247, 0.3); color: #c4b5fd; }

  .section { margin-bottom: 14px; }
  .section-title {
    font-size: 10px; font-weight: 700; color: #64748b; text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 8px;
  }

  .btn {
    width: 100%; padding: 10px; border: none; border-radius: 8px;
    font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s;
  }
  .btn:hover { transform: translateY(-1px); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .btn-primary { background: linear-gradient(135deg, #7c3aed, #3b82f6); color: white; }
  .btn-primary:hover:not(:disabled) { box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4); }
  .btn-secondary { background: #1e293b; color: #e2e8f0; border: 1px solid #334155; }
  .btn-secondary:hover:not(:disabled) { border-color: #7c3aed; }

  .data-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 0; font-size: 12px;
  }
  .data-label { color: #94a3b8; }
  .data-value { font-weight: 700; font-family: 'JetBrains Mono', monospace; font-size: 13px; }
  .data-value.session { color: #f97316; }
  .data-value.weekly { color: #a855f7; }
  .data-value.user { color: #3b82f6; }

  .schedule-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; background: #1e293b; border-radius: 8px; border: 1px solid #334155;
  }
  .schedule-row.active { border-color: #22c55e; background: rgba(34, 197, 94, 0.08); }
  .toggle {
    position: relative; width: 40px; height: 22px; flex-shrink: 0; cursor: pointer;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle .slider {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: #334155; border-radius: 11px; transition: 0.3s;
  }
  .toggle .slider::before {
    content: ''; position: absolute; height: 16px; width: 16px;
    left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.3s;
  }
  .toggle input:checked + .slider { background: #22c55e; }
  .toggle input:checked + .slider::before { transform: translateX(18px); }
  .schedule-info { flex: 1; }
  .schedule-info .label { font-size: 12px; font-weight: 600; }
  .schedule-info .desc { font-size: 10px; color: #94a3b8; margin-top: 2px; }

  .freq-select {
    width: 100%; padding: 8px 10px; background: #0f0f1a; border: 1px solid #334155;
    border-radius: 6px; color: #e2e8f0; font-size: 12px; font-family: inherit;
    margin-top: 8px; outline: none; cursor: pointer;
  }
  .freq-select:focus { border-color: #7c3aed; }

  .team-select {
    width: 100%; padding: 8px 10px; background: #1e293b; border: 1px solid #334155;
    border-radius: 6px; color: #e2e8f0; font-size: 12px; font-family: inherit;
    outline: none; cursor: pointer;
  }
  .team-select:focus { border-color: #7c3aed; }

  .spinner {
    display: inline-block; width: 12px; height: 12px;
    border: 2px solid rgba(255,255,255,0.3); border-top-color: white;
    border-radius: 50%; animation: spin 0.6s linear infinite;
    vertical-align: middle; margin-right: 4px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .auth-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; background: #1e293b; border-radius: 8px; border: 1px solid #334155;
  }
  .auth-row.authenticated { border-color: #22c55e; background: rgba(34, 197, 94, 0.08); }
  .auth-row.unauthenticated { border-color: #ef4444; background: rgba(239, 68, 68, 0.08); }
  .auth-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .auth-dot.green { background: #22c55e; }
  .auth-dot.red { background: #ef4444; }
  .auth-info { flex: 1; }
  .auth-info .label { font-size: 12px; font-weight: 600; }
  .auth-info .desc { font-size: 10px; color: #94a3b8; margin-top: 2px; word-break: break-all; }
  .auth-btn {
    padding: 6px 12px; border: none; border-radius: 6px;
    font-size: 11px; font-weight: 600; cursor: pointer;
    background: #7c3aed; color: white; flex-shrink: 0;
  }
  .auth-btn:hover { background: #6d28d9; }

  .token-row {
    margin-top: 8px; display: flex; gap: 6px;
  }
  .token-input {
    flex: 1; padding: 7px 10px; background: #0f0f1a; border: 1px solid #334155;
    border-radius: 6px; color: #e2e8f0; font-size: 11px;
    font-family: 'JetBrains Mono', monospace; outline: none;
  }
  .token-input:focus { border-color: #7c3aed; }
  .token-save-btn {
    padding: 7px 12px; border: none; border-radius: 6px;
    font-size: 11px; font-weight: 600; cursor: pointer;
    background: #22c55e; color: white; flex-shrink: 0;
  }
  .token-save-btn:hover { background: #16a34a; }
  .token-hint { font-size: 10px; color: #64748b; margin-top: 4px; }

  .footer {
    padding: 10px 20px; text-align: center; font-size: 10px;
    color: #475569; border-top: 1px solid #1e293b;
  }
  .footer a { color: #7c3aed; text-decoration: none; }

  #dataPreview { display: none; margin-bottom: 12px; }
  #dataPreview.visible { display: block; }
  .last-sync { font-size: 10px; color: #64748b; text-align: center; margin-bottom: 8px; }
</style>
</head>
<body>

<div class="header">
  <h1>Claude Usage Sync</h1>
  <p>Auto-syncs to your team leaderboard</p>
</div>

<div class="body">
  <div class="status info" id="status">Checking page...</div>

  <div id="dataPreview">
    <div class="data-row">
      <span class="data-label">User</span>
      <span class="data-value user" id="userName">--</span>
    </div>
    <div class="data-row">
      <span class="data-label">Session</span>
      <span class="data-value session" id="sessionPct">--</span>
    </div>
    <div class="data-row">
      <span class="data-label">Weekly</span>
      <span class="data-value weekly" id="weeklyPct">--</span>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Account</div>
    <div class="auth-row" id="authRow">
      <div class="auth-dot" id="authDot"></div>
      <div class="auth-info">
        <div class="label" id="authLabel">Checking...</div>
        <div class="desc" id="authDesc"></div>
      </div>
      <button class="auth-btn" id="authBtn" style="display:none;">Sign In</button>
    </div>
    <div class="token-row" id="tokenRow" style="display:none;">
      <input type="text" class="token-input" id="tokenInput" placeholder="Paste token from setup page">
      <button class="token-save-btn" id="tokenSaveBtn">Save</button>
    </div>
    <div class="token-hint" id="tokenHint" style="display:none;">
      Get your token from the setup page after SSO sign-in
    </div>
  </div>

  <div class="section">
    <div class="section-title">Team</div>
    <select class="team-select" id="teamSelect">
      <option value="NY">NY</option>
      <option value="NC">Namma Cloud (NC)</option>
      <option value="Xyne">Xyne</option>
      <option value="HS">Hyper Switch (HS)</option>
      <option value="JP">Juspay (JP)</option>
    </select>
  </div>

  <div class="section">
    <div class="section-title">Auto-Sync Schedule</div>
    <div class="schedule-row" id="scheduleRow">
      <label class="toggle">
        <input type="checkbox" id="scheduleToggle">
        <span class="slider"></span>
      </label>
      <div class="schedule-info">
        <div class="label" id="scheduleLabel">Disabled</div>
        <div class="desc">Syncs automatically in the background</div>
      </div>
    </div>
    <select class="freq-select" id="freqSelect">
      <option value="5" selected>Every 5 minutes</option>
      <option value="15">Every 15 minutes</option>
      <option value="30">Every 30 minutes</option>
    </select>
  </div>

  <div class="last-sync" id="lastSync" style="display:none;"></div>

  <button class="btn btn-primary" id="syncBtn" style="display:none;">Sync Now</button>
  <button class="btn btn-secondary" id="navBtn" style="display:none;">Open Usage Page</button>
</div>

<div class="footer">
  <a href="#" id="dashLink">Open Leaderboard Dashboard</a>
</div>

<script src="popup.js"></script>
</body>
</html>
