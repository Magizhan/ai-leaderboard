apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: leaderboard
  namespace: ai-leaderboard
  annotations:
    # Adjust these based on your ingress controller
    # nginx.ingress.kubernetes.io/proxy-body-size: "1m"
spec:
  rules:
    - host: leaderboard.internal.integ.movingtech.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: leaderboard
                port:
                  number: 80
