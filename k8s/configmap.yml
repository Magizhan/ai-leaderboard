apiVersion: v1
kind: ConfigMap
metadata:
  name: leaderboard-config
  namespace: ai-leaderboard
data:
  PORT: "3000"
  # Point to your existing Redis instance
  REDIS_URL: "redis://redis.default.svc.cluster.local:6379"
  PLAN_COST: "200"
  # Leave CF_ACCESS_AUD empty to skip CF auth (Pomerium handles it)
  CF_ACCESS_AUD: ""
